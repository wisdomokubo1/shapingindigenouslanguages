<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaping Indigenous Languages | GSC</title>
    <style>
        :root { --primary: #4285F4; --secondary: #34A853; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; max-width: 900px; margin: 40px auto; padding: 20px; background: var(--bg); color: #333; }
        .search-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .controls { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        select, input { padding: 12px; border: 2px solid #eee; border-radius: 8px; font-size: 16px; outline: none; }
        select { background: white; cursor: pointer; flex: 1; min-width: 150px; }
        input { flex: 3; min-width: 250px; }
        input:focus { border-color: var(--primary); }
        .btn-group { display: flex; gap: 10px; }
        button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-search { background: var(--primary); color: white; flex: 2; }
        .btn-download { background: var(--secondary); color: white; display: none; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .card { background: white; padding: 20px; margin-bottom: 15px; border-radius: 12px; border-left: 6px solid var(--primary); box-shadow: 0 4px 6px rgba(0,0,0,0.02); animation: fadeIn 0.3s ease; }
        .meta { font-size: 0.8em; color: #777; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        audio { width: 100%; margin-top: 15px; }
        #status { margin-bottom: 10px; font-weight: 500; color: #555; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <h1>Shaping Indigenous Languages 🌍 </h1>
    <h2>Global Shapers Community</h2>
    <p>Search this open resource repository for African languages via Hugging Face API.</p>

    <div class="search-container">
        <div class="controls">
            <select id="langSelect">
                <option value="hau_tts"selected>Hausa</option>
                <option value="yor_tts">Yoruba</option>
                <option value="ibo_tts">Igbo</option>
                <option value="ful_tts">Fulani</option>
                <option value="swa_tts">Swahili</option>
                <option value="twi_tts">Twi</option>
                <option value="aka_asr">Akan</option>
                <option value="ewe_tts">Ewe</option>
                <option value="fat_tts">Fante</option>
                <option value="amh_asr">Amharic</option>
                <option value="lin_asr">Lingala</option>
                <option value="lug_tts">Luganda</option>
                <option value="mlg_asr">Malagasy</option>
                <option value="wol_tts" >Wolof</option>
            </select>
            
            <input type="text" id="searchInput" placeholder="Search a word (e.g. 'Africa' or 'Hausa')...">
        </div>

        <div class="btn-group">
            <button class="btn-search" onclick="performSearch()">Search Dataset</button>
            <button id="dlBtn" class="btn-download" onclick="downloadResults()">Download List (.txt)</button>
        </div>
        <div id="status"></div>
    </div>

    <div id="results"></div>

    <script>
        let currentResults = [];

        async function performSearch() {
            const query = document.getElementById('searchInput').value.trim();
            const config = document.getElementById('langSelect').value;
            const container = document.getElementById('results');
            const status = document.getElementById('status');
            const dlBtn = document.getElementById('dlBtn');

            if (!query) return alert("Please enter a word to search.");

            container.innerHTML = "";
            dlBtn.style.display = "none";
            status.innerHTML = `🔍 Searching ${config} for "${query}"...`;

            // The Hugging Face Filter API URL
            const whereClause = `"text" LIKE '%${query}%'`;
            const url = `https://datasets-server.huggingface.co/filter?dataset=google/WaxalNLP&config=${config}&split=train&where=${encodeURIComponent(whereClause)}&limit=10`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (!data.rows || data.rows.length === 0) {
                    status.innerHTML = "❌ No matches found. Try another word or language.";
                    return;
                }

                currentResults = data.rows;
                status.innerHTML = `✅ Found ${data.rows.length} results:`;
                dlBtn.style.display = "inline-block";

                data.rows.forEach(item => {
                    const row = item.row;
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="meta">${config} | Entry ID: ${item.row_idx}</div>
                        <p><strong>Transcription:</strong> ${row.text}</p>
                        <audio controls src="${row.audio[0].src}"></audio>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                status.innerHTML = "⚠️ Error: API is unavailable or subset is being indexed.";
                console.error(err);
            }
        }

        function downloadResults() {
            if (currentResults.length === 0) return;
            
            const textContent = currentResults.map(r => 
                `ID: ${r.row_idx}\nText: ${r.row.text}\nAudio: ${r.row.audio[0].src}\n---`
            ).join('\n\n');

            const blob = new Blob([textContent], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `waxal_search_results.txt`;
            a.click();
        }
    </script>
</body>
</html>
